{% extends "base.html" %}{% set active='series' %}{% block body %}
<h2>{{ title }} <small>— {{ chapters|length }} chapters</small></h2>
<table><tr><th>ch</th><th>label</th><th>status</th><th>season</th><th></th></tr>
{% for c in chapters %}
<tr><td>{{ c.number }}</td><td><a href="/chapter/{{ c.id }}" style="color:var(--acc)">{{ c.label }}</a></td>
<td><span class="b {{ 'ok' if c.status in ('planned','rendered') else ('new' if c.status=='discovered' else 'q') }}">{{ c.status }}</span></td>
<td class="kv">{{ c.season or '—' }}</td>
<td><form class="inline" method="post" action="/jobs">
<input type="hidden" name="type" value="chain"><input type="hidden" name="chapter_id" value="{{ c.id }}">
<input type="hidden" name="target" value="planned"><button class="ghost">run → planned</button></form>
<form class="inline" method="post" action="/jobs">
<input type="hidden" name="type" value="qa_scan"><input type="hidden" name="chapter_id" value="{{ c.id }}">
<button class="ghost">QA scan</button></form></td></tr>
{% endfor %}</table>
{% endblock %}
