[sources.asura]
base_url = "https://asurascans.com"
[sources.webtoon]
base_url = "https://www.webtoons.com"
[sources.elftoon]
base_url = "https://elftoon.com"

[detect]
backend = "yolo"
yolo_weights = "assets/models/webtoon_panels.pt"   # in-repo copy (migration-proof)

[gallerydl]
sleep = 2.0

[models]
# LLM models per stage (cost-tunable). Swap to cheaper tiers freely; the
# usage_cost logger reports exact tokens + $ per run so quality/cost is A/B-able.
# beats: the writer. CONFIRMED 2026-06-12: local Gemma 4 via Ollama ($0,
# ~55s/group on MPS; A/B'd vs Flash — 0 parse errors, 79% selection agreement).
# Flash remains one config flip away: backend="vertex", model="gemini-2.5-flash".
beats_backend = "ollama"
beats_model = "gemma4:26b"
# script: OpenAI. gpt-4.1-mini is API-deprecating 2026-10-14; gpt-5-nano is ~5x cheaper.
script_model = "gpt-5-nano"
# punchup: genre-aware persona pass over the grounded beats (channel voice).
# "cinematic" = alternate-by-beat: DRAMATIC beats (high scene intensity) keep the
#   cinematic atmosphere, CONNECTIVE beats get full persona — the user's blend.
# "full" | "light" | "off". Grounded line survives as narration_plain;
# caption-bearing groups reject rewrites that drop the caption words.
punchup = "cinematic"
# OCR/visioned stage: "apple" = on-device macOS Vision (FREE, 97%% F1 vs Google) | "google" (paid)
vision_backend = "apple"

[tts]
# voiced backend: "qwen" (local MPS, LOCKED narrator clone — production) |
# "kokoro" (local, free, ~6x faster, flatter — pending listening verdict) |
# "chatterbox" (local, MIT) | "elevenlabs" (cloud, paid).
# Modal RETIRED (2026-06-11): local Qwen measured at the same ~20min/chapter
# wall time as the A10G (both sdpa, no flash-attn); $0.37/ch bought nothing
# but off-box execution. User directive: no external dependencies.
backend = "qwen"
voice_ref = "assets/voice/narrator_ref.wav"   # LOCKED narrator (user-picked clip g0021_p02).
                 # qwen clones it (Base ckpt, .txt transcript sidecar); chatterbox clones it too;
                 # kokoro ignores it (uses kokoro_voice).
python = ".qwen_venv/bin/python"   # repo-relative -> resolves per host (Air/Mini); isolated venv (deps conflict)
kokoro_voice = "am_puck"   # used only when backend = "kokoro"
