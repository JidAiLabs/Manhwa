[sources.asura]
base_url = "https://asurascans.com"
[sources.webtoon]
base_url = "https://www.webtoons.com"
[sources.elftoon]
base_url = "https://elftoon.com"

[detect]
backend = "yolo"
yolo_weights = "assets/models/webtoon_panels.pt"   # in-repo copy (migration-proof)

[gallerydl]
sleep = 2.0

[models]
# LLM models per stage (cost-tunable). Swap to cheaper tiers freely; the
# usage_cost logger reports exact tokens + $ per run so quality/cost is A/B-able.
# beats: the writer. CONFIRMED 2026-06-12: local Gemma 4 via Ollama ($0,
# ~55s/group on MPS; A/B'd vs Flash — 0 parse errors, 79% selection agreement).
# Flash remains one config flip away: backend="vertex", model="gemini-2.5-flash".
beats_backend = "ollama"
beats_model = "gemma4:26b"
# script: OpenAI. gpt-4.1-mini is API-deprecating 2026-10-14; gpt-5-nano is ~5x cheaper.
script_model = "gpt-5-nano"
# punchup: genre-aware persona pass over the grounded beats (channel voice).
# "cinematic" = alternate-by-beat: DRAMATIC beats (high scene intensity) keep the
#   cinematic atmosphere, CONNECTIVE beats get full persona — the user's blend.
# "full" | "light" | "off". Grounded line survives as narration_plain;
# caption-bearing groups reject rewrites that drop the caption words.
punchup = "cinematic"
# OCR/visioned stage: "apple" = on-device macOS Vision (FREE, 97%% F1 vs Google) | "google" (paid)
vision_backend = "apple"
# QA-eyes -> auto-heal (opt-in): a grounding judge flags weak/mis-grounded lines, the heal loop
# regenerates them, and the strictly-better safeguard reverts any non-improvement. false = current
# pipeline unchanged. Env STUDIO_SEMANTIC_HEAL=1 toggles per-run (used for the A/B comparison).
semantic_heal = false
# Legacy grouped-narration splitter. Keep OFF: panel_narration already provides
# one purpose-written, content-aligned line per panel. Turning this on discards
# that alignment and positionally re-splits the joined group text.
narration_microbeats = false
narration_microbeat_max_words = 28

[tts]
# voiced backend: "qwen-mlx" (Apple MLX, 8-bit Base clone — PRODUCTION 2026-06-22:
#   ~2x faster than torch-MPS, user-approved @ exag 1.4, runs in .mlx_venv) |
# "qwen" (torch MPS clone — prior production, kept as fallback) |
# "kokoro" (local, free, flatter) | "chatterbox" (local, MIT) | "elevenlabs" (cloud, paid).
# qwen-mlx expressiveness dial: STUDIO_MLX_EXAG (default 1.4) + STUDIO_MLX_TEMP.
# Modal RETIRED (2026-06-11): no external dependencies (user directive).
backend = "qwen-mlx"
voice_ref = "assets/voice/narrator_ref.wav"   # LOCKED narrator (user-picked clip g0021_p02).
                 # qwen-mlx/qwen clone it (Base ckpt + .txt transcript sidecar); chatterbox clones it too;
                 # kokoro ignores it (uses kokoro_voice).
python = ".mlx_venv/bin/python"   # repo-relative -> resolves per host (Air/Mini); MLX venv (mlx-audio). qwen fallback = .qwen_venv
kokoro_voice = "am_puck"   # used only when backend = "kokoro"
